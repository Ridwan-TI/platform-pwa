<!DOCTYPE html>
<html lang="id">
<head>
    <title>Login PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a1628;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .card {
            display: flex;
            width: 100%;
            max-width: 860px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 60px rgba(0,0,0,0.5);
            margin: 1rem;
        }
        /* ---- LEFT PANEL ---- */
        .left-panel {
            flex: 1;
            background: linear-gradient(145deg, #0a1628 0%, #0d2657 40%, #1a4a9e 75%, #2563eb 100%);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 260px;
            position: relative;
            overflow: hidden;
        }
        .left-panel::before {
            content: '';
            position: absolute;
            top: -50px; right: -50px;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: rgba(37,99,235,0.18);
        }
        .left-panel::after {
            content: '';
            position: absolute;
            bottom: -40px; left: -40px;
            width: 140px; height: 140px;
            border-radius: 50%;
            background: rgba(37,99,235,0.12);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span {
            color: white;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .testimonial {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 1.25rem;
            position: relative;
        }
        .testimonial p.quote {
            color: rgba(255,255,255,0.95);
            font-size: 15px;
            font-weight: 500;
            line-height: 1.55;
            margin-bottom: 1rem;
        }
        .testimonial p.name {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            font-weight: 600;
        }
        .testimonial p.role {
            color: rgba(255,255,255,0.55);
            font-size: 12px;
            margin-top: 2px;
        }
        /* ---- RIGHT PANEL ---- */
        .right-panel {
            flex: 1.2;
            background: #ffffff;
            padding: 2.75rem 2.25rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .right-panel h2 {
            font-size: 22px;
            font-weight: 700;
            color: #111827;
            text-align: center;
            margin-bottom: 6px;
        }
        .right-panel .subtitle {
            font-size: 13px;
            color: #6b7280;
            text-align: center;
            line-height: 1.55;
            margin-bottom: 1.75rem;
        }
        label {
            font-size: 11px;
            color: #6b7280;
            display: block;
            margin-bottom: 4px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            color: #111827;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #7c3aed;
        }
        .field { margin-bottom: 14px; }
        .forgot {
            font-size: 13px;
            color: #7c3aed;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 14px;
        }
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .remember-row span {
            font-size: 13px;
            color: #6b7280;
        }
        .toggle {
            width: 44px; height: 24px;
            border-radius: 12px;
            background: #7c3aed;
            position: relative;
            cursor: pointer;
        }
        .toggle::after {
            content: '';
            width: 20px; height: 20px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 2px; right: 2px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            background: #7c3aed;
            color: white;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-bottom: 16px;
            letter-spacing: 0.2px;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #6d28d9; }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .divider hr { flex: 1; border: none; border-top: 1px solid #e5e7eb; }
        .divider span { font-size: 12px; color: #9ca3af; }
        .btn-google {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 18px;
            transition: background 0.2s;
        }
        .btn-google:hover { background: #f3f4f6; }
        .signup-text {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }
        .signup-text a {
            color: #7c3aed;
            font-weight: 600;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .left-panel { display: none; }
            .right-panel { border-radius: 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- LEFT PANEL -->
        <div class="left-panel">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <rect width="12" height="12" rx="3" fill="white" opacity="0.9"/>
                    <rect x="16" width="12" height="12" rx="3" fill="white" opacity="0.6"/>
                    <rect y="16" width="12" height="12" rx="3" fill="white" opacity="0.6"/>
                    <rect x="16" y="16" width="12" height="12" rx="3" fill="white" opacity="0.4"/>
                </svg>
                <span>PAHLEVI</span>
            </div>
            <div class="testimonial">
                <p class="quote">"Semua kebutuhan belanja saya tersedia di sini dengan mudah dan cepat."</p>
                <p class="name">Ridwan E</p>
                <p class="role">Pelanggan Setia</p>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <h2>SELAMAT DATANG DI PLATFROM BELANJA PWA</h2>
            <p class="subtitle">Temukan berbagai produk terbaik dengan mudah<br>melalui platform belanja kami yang lengkap.</p>

            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="alex.jordan@gmail.com" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
    

            <button class="btn-login" id="btn-masuk">Masuk</button>


    <script>
        document.getElementById('btn-masuk').addEventListener('click', async function() {
            const usr = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;

            const getApiBaseUrl = () => {
                const path = window.location.pathname;
                if (path.includes("/app-toko/")) {
                    return "../api-toko/";
                } else {
                    return "api-toko/";
                }
            };
            const API_BASE = getApiBaseUrl();

            try {
                const res = await fetch(API_BASE + "login.php", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usr, password: pwd })
                });
                const hasil = await res.json();
                if(hasil.status === 'success') {
                    localStorage.setItem('token_toko', hasil.token);
                    alert('Berhasil Login!');
                    window.location.href = 'index.html';
                } else {
                    alert('Gagal: ' + hasil.pesan);
                }
            } catch(err) { console.log(err); }
        });
    </script>
</body>
</html>
