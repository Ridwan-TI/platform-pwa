<!DOCTYPE html>
<html lang="id">
<head>
    <title>Login PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
        <h2 class="text-2xl font-bold text-center mb-6 text-indigo-600">Login Sistem</h2>
        
        <form id="form-login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Username</label>
                <input type="text" id="username" class="w-full border p-2 rounded" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" id="password" class="w-full border p-2 rounded" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded hover:bg-indigo-700">Masuk</button>
        </form>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async function(e) {
            e.preventDefault();
            const usr = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;

            try {
                // SESUAIKAN DENGAN URL API ANDA
                const res = await fetch("http://localhost/toko-app-main/api-toko/login.php", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usr, password: pwd })
                });

                const hasil = await res.json();

                if(hasil.status === 'success') {
                    // SIMPAN TOKEN KE MEMORI HP/BROWSER
                    localStorage.setItem('token_toko', hasil.token);
                    alert('Berhasil Login!');
                    // Redirect paksa ke halaman utama aplikasi
                    window.location.href = 'index.html'; 
                } else {
                    alert('Gagal: ' + hasil.pesan);
                }
            } catch(err) { console.log(err); }
        });
    </script>
</body>
</html>
