<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Aplikasi Toko PWA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.png" type="image/png" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        background: linear-gradient(145deg, #0a1628 0%, #0d2657 40%, #1a4a9e 75%, #2563eb 100%);
        padding: 0;
      }

      /* ---- SIDEBAR ---- */
      .sidebar {
        width: 240px;
        min-height: 100vh;
        background: rgba(255,255,255,0.05);
        border-right: 1px solid rgba(255,255,255,0.1);
        padding: 1.5rem 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        position: fixed;
        top: 0; left: 0; bottom: 0;
      }

      .sidebar .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sidebar .logo span {
        color: white;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }

      .sidebar nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 10px;
        color: rgba(255,255,255,0.65);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
        text-decoration: none;
      }
      .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
      .nav-item.active { background: rgba(124,58,237,0.4); color: white; }
      .nav-item span.icon { font-size: 16px; }

      .sidebar-footer {
        margin-top: auto;
  
      }

      .btn-logout {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 10px;
        background: rgba(239,68,68,0.15);
        border: 1px solid rgba(239,68,68,0.3);
        color: #fca5a5;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-logout:hover { background: rgba(239,68,68,0.28); }

      /* ---- MAIN CONTENT ---- */
      .main {
        margin-left: 240px;
        padding: 2rem 2rem 2rem;
        min-height: 100vh;
      }

      /* ---- TOPBAR ---- */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.75rem;
      }
      .topbar h1 {
        font-size: 22px;
        font-weight: 700;
        color: white;
      }
      .topbar p {
        font-size: 12px;
        color: rgba(255,255,255,0.55);
        margin-top: 2px;
      }

      /* ---- SEARCH ---- */
      .search-wrap {
        margin-bottom: 1.25rem;
      }
      .search-wrap input {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 13px;
        color: white;
        width: 280px;
        outline: none;
        font-family: "Poppins", sans-serif;
        transition: border-color 0.2s;
      }
      .search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
      .search-wrap input:focus { border-color: #7c3aed; background: rgba(255,255,255,0.14); }

      /* ---- CARD ---- */
      .card {
        background: rgba(255,255,255,0.97);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      }

      .card-header {
        background: linear-gradient(90deg, #7c3aed, #6d28d9);
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .card-header h2 {
        font-size: 14px;
        font-weight: 600;
        color: white;
      }
      .card-header .badge {
        background: rgba(255,255,255,0.2);
        color: white;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
      }

      /* ---- FORM ---- */
      .form-section {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid #f1f5f9;
        background: #fafafa;
      }
      .form-section h3 {
        font-size: 12px;
        font-weight: 600;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }
      .form-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: flex-end;
      }
      .form-field { display: flex; flex-direction: column; gap: 4px; }
      .form-field label {
        font-size: 10px;
        font-weight: 600;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .form-field input[type="text"],
      .form-field input[type="number"] {
        padding: 9px 12px;
        border: 1.5px solid #e5e7eb;
        border-radius: 8px;
        font-size: 13px;
        font-family: "Poppins", sans-serif;
        color: #111827;
        outline: none;
        transition: border-color 0.2s;
        background: white;
        min-width: 150px;
      }
      .form-field input:focus { border-color: #7c3aed; }
      .form-field input[type="file"] {
        font-size: 12px;
        font-family: "Poppins", sans-serif;
        border: 1.5px solid #e5e7eb;
        border-radius: 8px;
        padding: 7px 10px;
        background: white;
        color: #6b7280;
        cursor: pointer;
      }

      .btn-simpan {
        padding: 9px 20px;
        background: #7c3aed;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }
      .btn-simpan:hover { background: #6d28d9; }

      .btn-batal {
        padding: 9px 16px;
        background: #f3f4f6;
        color: #6b7280;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }
      .btn-batal:hover { background: #e5e7eb; }

      .btn-logout {
  background-color:  #ef4444; /* merah terang */
  color: white; /* biar teks tetap jelas */
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 5px;
}

.btn-logout:hover {
  background-color:  #ef4444; /* merah lebih gelap saat hover */
}

      /* ---- TABLE ---- */
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead tr {
        background: #f8fafc;
        border-bottom: 1px solid #e5e7eb;
      }
      thead th {
        padding: 12px 20px;
        text-align: center;
        font-size: 11px;
        font-weight: 600;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      tbody td {
        padding: 12px 20px;
        text-align: center;
        color: #374151;
        vertical-align: middle;
      }
      tbody tr {
        border-bottom: 1px solid #f1f5f9;
        transition: background 0.15s;
      }
      tbody tr:hover { background: #f8f4ff; }
      tbody tr:last-child { border-bottom: none; }

      /* ---- FOOTER ---- */
      .footer-bar {
        margin-top: 1.25rem;
        font-size: 12px;
        color: rgba(255,255,255,0.5);
      }
      .footer-bar span {
        font-weight: 600;
        color: rgba(255,255,255,0.85);
      }

      /* ---- DECORATIVE CIRCLES ---- */
      .bg-circle-1 {
        position: fixed; top: -80px; right: -80px;
        width: 300px; height: 300px; border-radius: 50%;
        background: rgba(124,58,237,0.12);
        pointer-events: none;
      }
      .bg-circle-2 {
        position: fixed; bottom: -60px; left: 180px;
        width: 200px; height: 200px; border-radius: 50%;
        background: rgba(37,99,235,0.1);
        pointer-events: none;
      }

      @media (max-width: 768px) {
        .sidebar { display: none; }
        .main { margin-left: 0; padding: 1rem; }
        .search-wrap input { width: 100%; }
      }
    </style>
  </head>

  <body>
    <div class="bg-circle-1"></div>
    <div class="bg-circle-2"></div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <rect width="12" height="12" rx="3" fill="white" opacity="0.9"/>
          <rect x="16" width="12" height="12" rx="3" fill="white" opacity="0.6"/>
          <rect y="16" width="12" height="12" rx="3" fill="white" opacity="0.6"/>
          <rect x="16" y="16" width="12" height="12" rx="3" fill="white" opacity="0.4"/>
        </svg>
        <span>PAHLEVI STORE</span>
      </div>

      <nav>
        <a class="nav-item active" href="#">
          <span class="icon">🛒</span> Daftar Barang
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-logout" onclick="logout()">
          🚪 Logout
        </button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
      <!-- TOPBAR -->
      <div class="topbar">
        <div>
          <h1>Daftar Barang</h1>
          <p>Data produk dari database MySQL</p>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="search-wrap">
        <input type="text" id="search" placeholder="🔍 Cari barang..." />
      </div>

      <!-- CARD -->
      <div class="card">
        <div class="card-header">
          <h2>List Produk</h2>
          <span class="badge">Aktif</span>
        </div>

        <!-- FORM TAMBAH / EDIT -->
        <div class="form-section">
          <h3 id="form-title">➕ Tambah Barang Baru</h3>
          <input type="hidden" id="input-id" value="" />
          <div class="form-row">
            <div class="form-field" style="flex:1; min-width:140px;">
              <label>Nama Barang</label>
              <input type="text" id="input-nama" placeholder="Nama Barang" />
            </div>
            <div class="form-field" style="flex:1; min-width:120px;">
              <label>Harga</label>
              <input type="number" id="input-harga" placeholder="Harga (angka)" />
            </div>
            <div class="form-field" style="flex:1; min-width:160px;">
              <label>Foto Barang</label>
              <input type="file" id="input-gambar" accept="image/*" />
            </div>
            <div style="display:flex; gap:8px; padding-bottom:1px;">
              <button id="btn-simpan" class="btn-simpan">💾 Simpan</button>
              <button id="btn-batal" class="btn-batal hidden">✖ Batal</button>
            </div>
          </div>
        </div>

        <!-- TABLE -->
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Gambar</th>
              <th>Nama Barang</th>
              <th>Harga</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabel-barang" class="text-gray-700 divide-y divide-gray-200"></tbody>
        </table>
      </div>

      <!-- FOOTER -->
      <div class="footer-bar">
        Total Barang: <span id="total-barang">0</span>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
