<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d6efd" />
    <title>Aplikasi Toko PWA</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />

    <link rel="manifest" href="manifest.json" />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
    <link rel="icon" href="icons/icon-192.png" type="image/png" />
  </head>

  <body class="bg-gradient-to-br from-emerald-100 to-gray-100 min-h-screen p-6">
    <!-- CONTAINER BIAR RAPI -->
    <div class="w-full">
      <!-- HEADER -->
      <div class="mb-6 flex justify-between items-start">
    <div>
        <h1 class="text-3xl font-bold text-gray-800">🛒 Daftar Barang</h1>
        <p class="text-gray-500 text-sm">Data produk dari database MySQL</p>
    </div>

    <button
        onclick="logout()"
        class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg shadow-md font-medium transition"
    >
        🚪 Logout
    </button>
</div>
      <!-- SEARCH -->
      <div class="mb-4">
        <input type="text" id="search" placeholder="🔍 Cari barang..." class="w-full md:w-1/3 px-4 py-2 border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-400" />
      </div>

      <!-- CARD -->
      <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
        <!-- TITLE -->
        <div class="bg-emerald-500 text-white px-6 py-3">
          <h2 class="font-semibold">List Produk</h2>
        </div>

        <!-- FORM TAMBAH / EDIT BARANG -->
        <div class="px-6 py-4 border-b border-gray-100">
          <h3 id="form-title" class="text-sm font-semibold text-gray-600 mb-3">➕ Tambah Barang Baru</h3>
          <!-- Hidden field untuk menyimpan ID saat mode edit -->
          <input type="hidden" id="input-id" value="" />
          <div class="flex flex-col md:flex-row gap-3">
            <input
              type="text"
              id="input-nama"
              placeholder="Nama Barang"
              class="flex-1 px-4 py-2 border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 text-sm"
            />
            <input
              type="number"
              id="input-harga"
              placeholder="Harga (angka)"
              class="flex-1 px-4 py-2 border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 text-sm"
            />
            <button
              id="btn-simpan"
              class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-lg text-sm font-semibold transition"
            >
              💾 Simpan
            </button>
            <!-- Tombol Batal hanya muncul saat mode edit -->
            <button
              id="btn-batal"
              class="hidden bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-lg text-sm font-semibold transition"
            >
              ✖ Batal
            </button>
          </div>
        </div>

        <!-- TABLE -->
        <table class="w-full text-sm text-left border-collapse">
          <thead class="bg-gray-100 text-gray-600 uppercase text-xs text-center">
            <tr>
              <th class="px-6 py-3">ID</th>
              <th class="px-6 py-3">Nama Barang</th>
              <th class="px-6 py-3">Harga</th>
              <th class="px-6 py-3">Aksi</th>
            </tr>
          </thead>

          <tbody id="tabel-barang" class="text-gray-700 divide-y divide-gray-200"></tbody>
        </table>
      </div>

      <!-- FOOTER -->
      <div class="mt-4 text-sm text-gray-500">
        Total Barang:
        <span id="total-barang" class="font-semibold text-gray-700">0</span>
      </div>
    </div>

    <!-- JS — FIXED: nama file yang benar adalah app.js bukan script.js -->
    <script src="app.js"></script>
  </body>
</html>
